schemaVersion: 1
id: procedural-brick
title: Procedural brick texture
goal: Generate a brick texture at runtime and apply it to a Part.
tags:
  - editableimage
  - surfaceappearance
  - textures
steps:
  - id: s1-intro
    type: narrative
    body: |
      `EditableImage` works as a texture source, not just a GUI image.
      Bind one to `SurfaceAppearance.ColorMap` via `Content.fromObject`
      and you can generate textures at runtime. We'll draw a running-bond
      brick pattern with `DrawRectangle`.

  - id: s2-wall
    type: scripted
    body: "A tall, flat wall Part to texture."
    action:
      op: createInstance
      class: Part
      parent: Workspace
      props:
        Name: BrickWall
        Anchored: true
        Size: [16, 10, 1]
        Position: [0, 5, 0]
        Material: Enum.Material.SmoothPlastic
    focus:
      selection: Workspace.BrickWall

  - id: s3-texture
    type: codeEdit
    body: |
      Add the Texture server Script. It draws mortar-color background,
      then rectangles per brick with a small per-brick shade variation,
      then creates a SurfaceAppearance pointing at the image.
    explain: |
      Even rows are offset by half a brick (running bond). The per-brick
      `math.random()` shade gives each brick a slightly different color.
      `SurfaceAppearance` overrides `Material`, so the color map takes
      over entirely.
    target:
      path: Workspace.BrickWall.Texture
      create: true
      class: Script
    source: |
      local AssetService = game:GetService("AssetService")

      local part = script.Parent
      local W, H = 256, 256
      local BRICK_W, BRICK_H = 64, 24
      local MORTAR = 3

      local img = AssetService:CreateEditableImage({ Size = Vector2.new(W, H) })
      img:DrawRectangle(Vector2.zero, img.Size, Color3.fromRGB(40, 40, 40), 0, Enum.ImageCombineType.Overwrite)

      for y = 0, H // BRICK_H do
        local offset = (y % 2) * (BRICK_W / 2)
        for x = -1, W // BRICK_W + 1 do
          local px = x * BRICK_W + offset + MORTAR
          local py = y * BRICK_H + MORTAR
          local shade = 0.75 + math.random() * 0.2
          local color = Color3.fromRGB(150 * shade, 60 * shade, 45 * shade)
          img:DrawRectangle(
            Vector2.new(px, py),
            Vector2.new(BRICK_W - MORTAR * 2, BRICK_H - MORTAR * 2),
            color, 0, Enum.ImageCombineType.Overwrite
          )
        end
      end

      local surface = Instance.new("SurfaceAppearance")
      surface.ColorMap = Content.fromObject(img)
      surface.Parent = part
    focus:
      script:
        path: Workspace.BrickWall.Texture

  - id: s4-playtest
    type: narrative
    body: |
      Press ▶ **Play** (F5). The wall gets a random brick texture. Every
      session produces slightly different bricks because the shade is
      randomized at generation time. Shift+F5 to stop.
