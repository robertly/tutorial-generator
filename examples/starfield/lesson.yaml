schemaVersion: 1
id: starfield
title: Starfield
goal: Animate a 3D starfield with perspective projection.
tags:
  - editableimage
  - graphics
  - animation
steps:
  - id: s1-intro
    type: narrative
    body: |
      The Windows 95 screensaver lives on. 200 stars with random (x, y, z)
      in space, each frame z decreases, project onto the screen with
      `screen = world / z`. Stars that pass the camera respawn at the back.

  - id: s2-gui
    type: scripted
    body: "ScreenGui host."
    action:
      op: createInstance
      class: ScreenGui
      parent: StarterGui
      props:
        Name: StarfieldGui
        ResetOnSpawn: false
    focus:
      selection: StarterGui.StarfieldGui

  - id: s3-canvas
    type: scripted
    body: "Canvas."
    action:
      op: createInstance
      class: ImageLabel
      parent: StarterGui.StarfieldGui
      props:
        Name: Canvas
        Size: [0, 512, 0, 512]
        Position: [0.5, -256, 0.5, -256]
        BackgroundColor3: [0, 0, 0]
        BorderSizePixel: 0
    focus:
      selection: StarterGui.StarfieldGui.Canvas

  - id: s4-stars
    type: codeEdit
    body: |
      Add the Starfield LocalScript. Clear to near-black, advance each
      star toward the camera, project, and draw a small bright circle.
      Stars closer to the camera are bigger and whiter.
    target:
      path: StarterGui.StarfieldGui.Canvas.Starfield
      create: true
      class: LocalScript
    source: |
      local AssetService = game:GetService("AssetService")
      local RunService = game:GetService("RunService")

      local W, H = 256, 256
      local NUM_STARS = 200

      local label = script.Parent
      local img = AssetService:CreateEditableImage({ Size = Vector2.new(W, H) })

      local stars = {}
      for i = 1, NUM_STARS do
        stars[i] = {
          x = math.random() * W - W / 2,
          y = math.random() * H - H / 2,
          z = math.random() * W,
        }
      end

      RunService.Heartbeat:Connect(function(dt)
        img:DrawRectangle(Vector2.zero, img.Size, Color3.new(0, 0, 0.05), 0, Enum.ImageCombineType.Overwrite)
        for _, s in stars do
          s.z -= dt * 100
          if s.z <= 1 then
            s.x = math.random() * W - W / 2
            s.y = math.random() * H - H / 2
            s.z = W
          end
          local px = s.x / s.z * W + W / 2
          local py = s.y / s.z * H + H / 2
          local bright = math.clamp(1 - s.z / W, 0, 1)
          local r = math.floor(bright * 2) + 1
          if px >= 0 and px < W and py >= 0 and py < H then
            img:DrawCircle(Vector2.new(px, py), r, Color3.new(bright, bright, bright), 0, Enum.ImageCombineType.AlphaBlend)
          end
        end
      end)

      label.ImageContent = Content.fromObject(img)
    focus:
      script:
        path: StarterGui.StarfieldGui.Canvas.Starfield

  - id: s5-playtest
    type: narrative
    body: |
      Press ▶ **Play** (F5). Stars stream past the camera toward you.
      Shift+F5 to stop.
