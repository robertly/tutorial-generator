schemaVersion: 1
id: thermal-vision
title: Thermal vision
goal: Map a procedural scalar field through a jet palette.
tags:
  - editableimage
  - graphics
  - animation
steps:
  - id: s1-intro
    type: narrative
    body: |
      A thermal camera visualizes temperature by mapping intensity
      through a palette (typically blue→red). We'll build a procedural
      heat field with two moving sources and render it through a jet
      palette.

  - id: s2-gui
    type: scripted
    body: "ScreenGui host."
    action:
      op: createInstance
      class: ScreenGui
      parent: StarterGui
      props:
        Name: ThermalGui
        ResetOnSpawn: false
    focus:
      selection: StarterGui.ThermalGui

  - id: s3-canvas
    type: scripted
    body: "Canvas ImageLabel."
    action:
      op: createInstance
      class: ImageLabel
      parent: StarterGui.ThermalGui
      props:
        Name: Canvas
        Size: [0, 512, 0, 512]
        Position: [0.5, -256, 0.5, -256]
        BackgroundColor3: [0, 0, 0]
        BorderSizePixel: 0
    focus:
      selection: StarterGui.ThermalGui.Canvas

  - id: s4-thermal
    type: codeEdit
    body: |
      Each pixel's heat is summed inverse-distance to two orbiting
      sources. The heatmap function is a cheap jet-ish palette — three
      tent functions offset along a single parameter.
    target:
      path: StarterGui.ThermalGui.Canvas.Thermal
      create: true
      class: LocalScript
    source: |
      local AssetService = game:GetService("AssetService")
      local RunService = game:GetService("RunService")

      local W, H = 256, 256
      local label = script.Parent
      local img = AssetService:CreateEditableImage({ Size = Vector2.new(W, H) })
      local buf = buffer.create(W * H * 4)

      local function heatmap(t)
        local r = math.clamp(1.5 - math.abs(t * 4 - 3), 0, 1)
        local g = math.clamp(1.5 - math.abs(t * 4 - 2), 0, 1)
        local b = math.clamp(1.5 - math.abs(t * 4 - 1), 0, 1)
        return r, g, b
      end

      local time = 0
      RunService.Heartbeat:Connect(function(dt)
        time += dt
        local k = 0
        for y = 0, H - 1 do
          for x = 0, W - 1 do
            local fx, fy = x / W - 0.5, y / H - 0.5
            local d1 = math.sqrt((fx - math.sin(time) * 0.3) ^ 2 + (fy - math.cos(time) * 0.3) ^ 2)
            local d2 = math.sqrt((fx + math.sin(time * 1.3) * 0.3) ^ 2 + (fy + math.cos(time * 0.9) * 0.3) ^ 2)
            local heat = math.clamp(0.2 / (d1 + 0.05) + 0.15 / (d2 + 0.05), 0, 1)
            local r, g, b = heatmap(heat)
            buffer.writeu8(buf, k, math.floor(r * 255))
            buffer.writeu8(buf, k + 1, math.floor(g * 255))
            buffer.writeu8(buf, k + 2, math.floor(b * 255))
            buffer.writeu8(buf, k + 3, 255)
            k += 4
          end
        end
        img:WritePixelsBuffer(Vector2.zero, img.Size, buf)
      end)

      label.ImageContent = Content.fromObject(img)
    focus:
      script:
        path: StarterGui.ThermalGui.Canvas.Thermal

  - id: s5-playtest
    type: narrative
    body: |
      Press ▶ **Play** (F5). Two hot spots orbit around each other
      through a blue/green/yellow/red palette. Shift+F5 to stop.
