schemaVersion: 1
id: ripple-effect
title: Ripple effect
goal: Poke a 2D wave simulation on click and render it as pixels.
tags:
  - editableimage
  - simulation
  - interactive
steps:
  - id: s1-intro
    type: narrative
    body: |
      A click pokes an impulse into a 2D height field; neighbor averaging
      propagates it outward as ripples. Every frame we step the sim and
      redraw the field as a blue-tinted grayscale image.

  - id: s2-gui
    type: scripted
    body: "ScreenGui host."
    action:
      op: createInstance
      class: ScreenGui
      parent: StarterGui
      props:
        Name: RippleGui
        ResetOnSpawn: false
    focus:
      selection: StarterGui.RippleGui

  - id: s3-canvas
    type: scripted
    body: "Canvas ImageLabel — pixelated sampling, centered."
    action:
      op: createInstance
      class: ImageLabel
      parent: StarterGui.RippleGui
      props:
        Name: Canvas
        Size: [0, 576, 0, 576]
        Position: [0.5, -288, 0.5, -288]
        BackgroundColor3: [0, 0, 0]
        BorderSizePixel: 0
    focus:
      selection: StarterGui.RippleGui.Canvas

  - id: s4-ripple
    type: codeEdit
    body: |
      Add the Ripple LocalScript. Two height buffers ping-pong each
      frame; clicks drop a small impulse. The wave equation is just
      "new value = average of 4 neighbors × 2 minus previous, damped."
    explain: |
      This is the classic Hugo Elias water ripple. Damping keeps the
      system stable — without it energy grows and explodes. Edges are
      held at zero (we only iterate `1 .. W-2`), which reflects waves
      back.
    target:
      path: StarterGui.RippleGui.Canvas.Ripple
      create: true
      class: LocalScript
    source: |
      local AssetService = game:GetService("AssetService")
      local RunService = game:GetService("RunService")

      local W, H = 192, 192
      local DAMPING = 0.985

      local label = script.Parent
      local img = AssetService:CreateEditableImage({ Size = Vector2.new(W, H) })

      local cur = table.create(W * H, 0)
      local prev = table.create(W * H, 0)
      local buf = buffer.create(W * H * 4)

      local function idx(x, y) return y * W + x + 1 end

      local function step()
        for y = 1, H - 2 do
          for x = 1, W - 2 do
            local i = idx(x, y)
            local v = (prev[idx(x - 1, y)] + prev[idx(x + 1, y)]
              + prev[idx(x, y - 1)] + prev[idx(x, y + 1)]) * 0.5 - cur[i]
            cur[i] = v * DAMPING
          end
        end
        cur, prev = prev, cur
      end

      local function draw()
        local k = 0
        for i = 1, W * H do
          local v = math.clamp(128 + prev[i] * 6, 0, 255)
          buffer.writeu8(buf, k, math.floor(v * 0.3))
          buffer.writeu8(buf, k + 1, math.floor(v * 0.6))
          buffer.writeu8(buf, k + 2, math.floor(v))
          buffer.writeu8(buf, k + 3, 255)
          k += 4
        end
        img:WritePixelsBuffer(Vector2.zero, img.Size, buf)
      end

      label.ImageContent = Content.fromObject(img)

      label.InputBegan:Connect(function(input)
        if input.UserInputType == Enum.UserInputType.MouseButton1 then
          local ap, as = label.AbsolutePosition, label.AbsoluteSize
          local px = math.floor((input.Position.X - ap.X) / as.X * W)
          local py = math.floor((input.Position.Y - ap.Y) / as.Y * H)
          for dy = -2, 2 do
            for dx = -2, 2 do
              local x = math.clamp(px + dx, 0, W - 1)
              local y = math.clamp(py + dy, 0, H - 1)
              prev[idx(x, y)] = 200
            end
          end
        end
      end)

      RunService.Heartbeat:Connect(function()
        step()
        draw()
      end)
    focus:
      script:
        path: StarterGui.RippleGui.Canvas.Ripple

  - id: s5-playtest
    type: narrative
    body: |
      Press ▶ **Play** (F5). Click anywhere in the canvas — ripples
      propagate outward and reflect off the edges. Click repeatedly to
      interfere waves. Shift+F5 to stop.
